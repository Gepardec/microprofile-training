# property class
backend.host=localhost
backend.port=8080
backend.endpoint=backend

frontend.host=localhost
frontend.port=8081
frontend.endpoint=frontend
        
# openapi
mp.openapi.scan.packages=com.gepardec.training.microprofile.basic.openapi
mp.openapi.filter=com.gepardec.training.microprofile.basic.openapi.MyFilter

# rest client
