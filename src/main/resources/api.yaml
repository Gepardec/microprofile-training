---
openapi: 3.0.3
info:
  title: microprofile-training-1.0.0-SNAPSHOT.war
  version: "1.0"
servers:
  - url: /mptraining
paths:
  /cheetahs:
    get:
      summary: List full with cheetahs.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        "404":
          description: No Cheetah found
    post:
      description: A new cheetah is born
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: OK
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: {}
    delete:
      description: Removes a cheetah from the coalition
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "202":
          description: Operation executed successfully
        "204":
          description: No Cheetah found
